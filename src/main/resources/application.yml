spring:
  main:
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:mysql://__:3306/assignment?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
