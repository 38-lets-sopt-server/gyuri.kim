spring:
  datasource:
    url: jdbc:h2:mem:mydb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
      dialect: org.hibernate.dialect.H2Dialect

      spring:
        datasource:
          url: jdbc:mysql://{RDS 엔드포인트}:3306/assignment
          driver-class-name: com.mysql.cj.jdbc.Driver
          username: 
          password: 

        jpa:
          hibernate:
            ddl-auto: update
          show-sql: true
          properties:
            hibernate:
              format_sql: true
              use_sql_comments: true
              dialect: org.hibernate.dialect.MySQL8Dialect
